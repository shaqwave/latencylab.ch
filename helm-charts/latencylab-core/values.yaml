# Default values for latencylab-core Helm chart.


# 🧰 Registry configuration
registry:
  fqdn: cr.latencylab.is.
  secretName: cr-latencylab-is
  enabled: false
  image: registry:2
  storage:
    size: 5Gi
    class: csi-cinder-sc-retain
  ingressClassName: nginx-core
  parentIngressClass:
    enabled: true
  ingressClassResource:
    name: nginx-core
    enabled: true
    default: false

# ⚙️ Redirect settings
redirect:
  enabled: true
  responseCode: 301
  hosts:
    - latencylab.is
    - www.latencylab.is
  target: latencylab.ch
  tlsSecretName: latencylab-is-tls
  ingressClassName: nginx-redirect
  parentIngressClass:
    enabled: true
  ingressClassResource:
    name: nginx-redirect
    enabled: true
    default: false
    annotations:
      nginx.ingress.kubernetes.io/permanent-redirect: https://latencylab.ch$request_uri
      nginx.ingress.kubernetes.io/ssl-redirect: "true"
      nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
      nginx.ingress.kubernetes.io/use-regex: "true"

# 🧪 Monitoring (external to chart but for reference)
monitoring:
  enabled: false  # managed via CI or external cron, not installed by this chart

# 🛠 Ingress controller config (global)
ingress:
  enabled: true
  controller:
    replicaCount: 1
    service:
      type: LoadBalancer
      loadBalancerIPFile: latencylab-ip.txt
    publishService:
      enabled: true
