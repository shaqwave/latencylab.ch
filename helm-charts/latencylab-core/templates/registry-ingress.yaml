{{- if .Values.registry.enabled }}
  {{- if .Values.registry.parentIngressClass.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: registry
  annotations:
    kubernetes.io/ingress.class: {{ .Values.registry.ingressClassName }}
spec:
  ingressClassName: {{ .Values.registry.ingressClassName }}
  tls:
    - hosts:
        - {{ .Values.registry.fqdn }}
      secretName: {{ .Values.registry.secretName }}-tls
  rules:
      - host: {{ .Values.registry.fqdn }}
        http:
          paths:
            - path: /
              pathType: Prefix
              backend:
                service:
                  name: registry
                  port:
                    number: 5000
  {{- end }}
{{- end }}
